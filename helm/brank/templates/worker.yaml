apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brank.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brank.labels" . | nindent 4 }}
    app: {{ include "brank.fullname" . }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ include "brank.fullname" . }}
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "brank.fullname" . }}
        component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.workerImage.repository }}:{{ .Values.workerImage.tag }}"
          imagePullPolicy: {{ .Values.workerImage.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "brank.secretName" . }}
            - configMapRef:
                name: {{ include "brank.fullname" . }}-config
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

