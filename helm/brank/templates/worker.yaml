apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brank.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brank.labels" . | nindent 4 }}
    app: {{ include "brank.fullname" . }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: {{ include "brank.fullname" . }}
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "brank.fullname" . }}
        component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bun
            - packages/ingestion/src/worker.ts
          envFrom:
            - secretRef:
                name: {{ include "brank.secretName" . }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.secrets.DATABASE_URL | quote }}
            - name: RABBITMQ_URL
              value: {{ .Values.secrets.RABBITMQ_URL | quote }}
            - name: RABBITMQ_QUEUE
              value: {{ .Values.ingestion.queue | quote }}
            - name: RABBITMQ_DLQ
              value: {{ .Values.ingestion.dlq | quote }}
            - name: RABBITMQ_PREFETCH
              value: {{ .Values.ingestion.prefetch | quote }}
            - name: INGESTION_MAX_BATCH_SIZE
              value: {{ .Values.ingestion.maxBatchSize | quote }}
            - name: INGESTION_MAX_BATCH_WAIT_MS
              value: {{ .Values.ingestion.maxBatchWaitMs | quote }}
            - name: INGESTION_MAX_RETRIES
              value: {{ .Values.ingestion.maxRetries | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep worker.ts"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
