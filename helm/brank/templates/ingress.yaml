{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "brank.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brank.labels" . | nindent 4 }}
    app: {{ include "brank.fullname" . }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "brank.fullname" . }}-app
                port:
                  number: 3000
{{- end }}
