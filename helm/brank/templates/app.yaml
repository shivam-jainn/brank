apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brank.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brank.labels" . | nindent 4 }}
    app: {{ include "brank.fullname" . }}
    component: app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ include "brank.fullname" . }}
      component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "brank.fullname" . }}
        component: app
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "start"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "brank.secretName" . }}
            - configMapRef:
                name: {{ include "brank.fullname" . }}-config
          env:
            - name: INFERHENCE_INGEST_URL
              value: http://{{ include "brank.fullname" . }}-app:3000/api/ingest
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "brank.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brank.labels" . | nindent 4 }}
    app: {{ include "brank.fullname" . }}
    component: app
spec:
  selector:
    app: {{ include "brank.fullname" . }}
    component: app
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
