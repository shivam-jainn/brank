# Kubernetes Secrets — FILL IN BEFORE APPLYING
# kubectl create secret generic brank-secrets --from-env-file=.env
#
# Or apply this template after substituting the placeholder values:
#   sed 's/<BASE64_VALUE>/your_value/g' k8s/secrets.yaml | kubectl apply -f -
#
# All values must be base64 encoded: echo -n 'value' | base64

apiVersion: v1
kind: Secret
metadata:
  name: brank-secrets
  namespace: default
type: Opaque
data:
  # Required
  DATABASE_URL: <BASE64_DATABASE_URL>
  RABBITMQ_URL: <BASE64_RABBITMQ_URL>
  REDIS_URL: <BASE64_REDIS_URL>

  # At least one provider key is required
  OPENAI_API_KEY: <BASE64_OPENAI_API_KEY>
  GROQ_API_KEY: <BASE64_GROQ_API_KEY>

  # Optional auth keys
  BETTER_AUTH_SECRET: <BASE64_BETTER_AUTH_SECRET>
  GOOGLE_CLIENT_ID: <BASE64_GOOGLE_CLIENT_ID>
  GOOGLE_CLIENT_SECRET: <BASE64_GOOGLE_CLIENT_SECRET>
  GITHUB_CLIENT_ID: <BASE64_GITHUB_CLIENT_ID>
  GITHUB_CLIENT_SECRET: <BASE64_GITHUB_CLIENT_SECRET>
