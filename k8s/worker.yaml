---
# Ingestion Worker Deployment — consumer-only process
#
# Consumes inference events from RabbitMQ and writes them to Postgres in
# micro-batches.  Runs the standalone worker script:
#   packages/ingestion/src/worker.ts
#
# Scaling:
#   Increase `replicas` to fan out consumption.  Each worker pod opens its
#   own channel and amqplib distributes messages round-robin across channels.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brank-worker
  labels:
    app: brank
    component: worker
spec:
  replicas: 1          # increase for higher throughput
  selector:
    matchLabels:
      app: brank
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: brank
        component: worker
    spec:
      terminationGracePeriodSeconds: 60   # give the worker time to drain
      containers:
        - name: worker
          image: brank-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: brank-secrets
            - configMapRef:
                name: brank-config
          env:
            - name: DATABASE_URL
              value: postgresql://brank:brank@postgres:5432/brank
            - name: RABBITMQ_URL
              value: amqp://brank:brank@rabbitmq:5672
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
