services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brank
      POSTGRES_PASSWORD: brank
      POSTGRES_DB: brank
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brank -d brank"]
      interval: 5s
      timeout: 5s
      retries: 20

